# Production Override for docker-compose.yml
# 
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This removes development volumes (live reload) and adds production settings

version: '3.8'

services:
  backend:
    # Remove volumes for immutable production image
    volumes: []
    # Remove reload for production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    # Remove volumes for immutable production image
    volumes: []
    # Remove reload for production
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --logger.level=error
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
